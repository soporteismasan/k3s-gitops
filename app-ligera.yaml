apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-ligera
  namespace: default
spec:
  # El número de réplicas ahora será gestionado por el HPA, 
  # pero dejamos 2 como punto de partida.
  replicas: 2 
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
      annotations:
        # Instrucciones para que Prometheus recoja datos del puerto 9113
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
    spec:
      containers:
      # 1. CONTENEDOR PRINCIPAL: Nginx
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config-volume
          mountPath: /etc/nginx/conf.d
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "64Mi"

      # 2. CONTENEDOR SIDECAR: Exportador de métricas
      - name: exporter
        image: nginx/nginx-prometheus-exporter:latest
        args:
          - -nginx.scrape-uri=http://localhost/stub_status
        ports:
        - containerPort: 9113
        resources:
          limits:
            cpu: "20m"
            memory: "32Mi"

      # Volumen para inyectar la configuración del stub_status
      volumes:
      - name: config-volume
        configMap:
          name: nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: app-ligera
spec:
  ports:
  - name: http
    port: 80
    targetPort: 80
  - name: metrics
    port: 9113
    targetPort: 9113
  selector:
    app: web